<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Forecast</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Outfit',sans-serif;
  background:#050d1a;
  color:#fff;
}

/* HELP OF INTERNET HERE */
.grad-text{
  background:linear-gradient(135deg,#38bdf8,#818cf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hidden{display:none;}
</style>
</head>

<body class="min-h-screen">

<!-- HEADER -->
<header class="backdrop-blur-xl border-b border-white/10 bg-white/5">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold grad-text">Weather Pro</h1>

    <div>
      <button id="btn-c" onclick="toggleUnit('C')" class="px-3 py-1 bg-blue-400 text-black rounded">°C</button>
      <button id="btn-f" onclick="toggleUnit('F')" class="px-3 py-1 bg-white/20 rounded">°F</button>
    </div>
  </div>
</header>

<!--MAIN-->
<main class="max-w-6xl mx-auto px-4 py-6 transition-all duration-500">
<div class="bg-white/10 p-4 rounded-xl mb-5">
  <input id="city-input" placeholder="Enter city..."
    class="w-full p-2 rounded text-black">
  <button onclick="searchByCity()" class="mt-2 w-full bg-blue-500 p-2 rounded">Search</button>
</div>

<div id="current-weather" class="hidden bg-white/10 p-5 rounded-xl mb-5">
  <h2 id="cw-city" class="text-xl font-bold"></h2>
  <p id="cw-desc"></p>
  <h1 id="cw-temp" class="text-4xl font-bold"></h1>
  <p id="cw-humidity"></p>
  <p id="cw-wind"></p>
</div>

<div id="forecast-section" class="hidden">
  <h2 class="mb-3">5 Day Forecast</h2>
  <div id="forecast-cards" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
